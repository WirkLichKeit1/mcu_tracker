services:
  db:
    image: mysql:8.0
    container_name: mcu_tracker_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mcu_tracker}
      MYSQL_USER: ${MYSQL_USER:-mcu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mcu}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcu_tracker_api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-mcu}:${MYSQL_PASSWORD:-mcu}@db:3306/${MYSQL_DATABASE:-mcu_tracker}
      ENV: ${ENV:-development}
      MYSQL_USER: ${MYSQL_USER:-mcu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mcu}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mcu_tracker}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: ["sh", "/app/entrypoint.sh"]

volumes:
  mysql_data: